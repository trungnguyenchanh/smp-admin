<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMP Admin v3.3 — 3-sided marketplace</title>
<style>
/* SMP Admin v2 — Step-based Service Model
   Light theme · Indigo accent · Stripe/Linear style */

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
@import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css');

:root {
  --primary: #4f46e5;
  --primary-dark: #4338ca;
  --primary-bg: #eef2ff;
  --primary-border: #c7d2fe;
  --primary-text: #3730a3;

  --tech: #1D9E75;
  --tech-bg: #E1F5EE;
  --tech-text: #085041;

  --amber: #d97706;
  --amber-bg: #fef3c7;
  --amber-text: #92400e;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --red-text: #b91c1c;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --green-text: #166534;
  --violet: #7c3aed;
  --violet-bg: #f5f3ff;
  --violet-text: #5b21b6;

  --bg: #f8fafc;
  --bg-card: #ffffff;
  --bg-elev: #f1f5f9;

  --text: #0f172a;
  --text-mute: #64748b;
  --text-faint: #94a3b8;
  --text-soft: #cbd5e1;

  --border: #e2e8f0;
  --border-soft: #f1f5f9;

  --sidebar-w: 220px;
  --topbar-h: 52px;

  --r-sm: 6px;
  --r: 8px;
  --r-lg: 10px;

  --font-sans: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; font-size: inherit; border: none; background: none; color: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-thumb { background: var(--text-soft); border-radius: 4px; }
*::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

/* ============ APP SHELL ============ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas: "sidebar topbar" "sidebar main";
  height: 100vh;
}

/* ============ SIDEBAR ============ */
.sidebar {
  grid-area: sidebar;
  background: white;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar__brand {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar__brand-mark {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: var(--primary);
  color: white;
  display: grid;
  place-items: center;
  font-weight: 700;
  font-size: 12px;
}
.sidebar__brand-name {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.1;
}
.sidebar__brand-tag {
  font-size: 11px;
  color: var(--text-mute);
  margin-top: 2px;
}
.sidebar__nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 8px;
}
.nav-section {
  margin-bottom: 16px;
}
.nav-section__label {
  display: flex;
  justify-content: space-between;
  padding: 6px 10px;
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-weight: 600;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  color: var(--text-mute);
  font-size: 13px;
  cursor: pointer;
  margin: 1px 0;
  transition: background 80ms, color 80ms;
}
.nav-item:hover { background: var(--bg-elev); color: var(--text); }
.nav-item--active { background: var(--primary-bg); color: var(--primary-text); }
.nav-item--active i { color: var(--primary); }
.nav-item i { font-size: 16px; color: var(--text-faint); }
.nav-item span:not(.nav-badge) { flex: 1; }
.nav-badge {
  font-size: 10px;
  padding: 1px 6px;
  background: var(--bg-elev);
  color: var(--text-mute);
  border-radius: 4px;
  font-weight: 500;
  letter-spacing: 0.4px;
}
.nav-badge--alert { background: var(--red-bg); color: var(--red-text); }
.nav-badge--new { background: var(--green-bg); color: var(--green-text); }
.nav-badge--live { background: var(--green-bg); color: var(--green-text); }
.sidebar__user {
  padding: 12px 14px;
  border-top: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--primary-bg);
  color: var(--primary-text);
  display: grid;
  place-items: center;
  font-weight: 600;
  font-size: 11px;
}
.user-info { flex: 1; min-width: 0; line-height: 1.2; }
.user-name { font-size: 12px; font-weight: 500; }
.user-role { font-size: 10px; color: var(--text-mute); }

/* ============ TOPBAR ============ */
.topbar {
  grid-area: topbar;
  background: white;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}
.crumb {
  font-size: 13px;
  color: var(--text-mute);
}
.crumb__sep { color: var(--text-soft); margin: 0 6px; }
.crumb__cur { color: var(--text); font-weight: 500; }
.topbar__search {
  flex: 1;
  max-width: 380px;
  position: relative;
}
.topbar__search input {
  width: 100%;
  padding: 7px 10px 7px 32px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  background: var(--bg);
  font-family: inherit;
}
.topbar__search input:focus { border-color: var(--primary); background: white; }
.topbar__search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-faint);
  font-size: 14px;
}
.topbar__actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}
.env-tag {
  font-size: 10px;
  padding: 3px 8px;
  background: var(--amber-bg);
  color: var(--amber-text);
  border-radius: 4px;
  font-weight: 600;
  letter-spacing: 0.4px;
}

/* ============ MAIN ============ */
.main {
  grid-area: main;
  overflow-y: auto;
  padding: 20px 24px;
}

/* ============ PAGE HEADER ============ */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 18px;
  gap: 16px;
  flex-wrap: wrap;
}
.page-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin: 0;
}
.page-sub {
  font-size: 12px;
  color: var(--text-mute);
  margin-top: 4px;
}
.page-actions {
  display: flex;
  gap: 8px;
}

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: white;
  cursor: pointer;
  transition: background 100ms, border-color 100ms;
  white-space: nowrap;
}
.btn:hover { background: var(--bg-elev); }
.btn--primary {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.btn--primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
.btn--ghost { background: transparent; border-color: transparent; color: var(--text-mute); }
.btn--ghost:hover { background: var(--bg-elev); color: var(--text); }
.btn--danger { color: var(--red-text); border-color: var(--red-bg); }
.btn--danger:hover { background: var(--red-bg); }
.btn--sm { padding: 4px 10px; font-size: 12px; }
.icon-btn {
  width: 32px;
  height: 32px;
  display: grid;
  place-items: center;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: white;
  color: var(--text-mute);
  cursor: pointer;
  position: relative;
}
.icon-btn:hover { background: var(--bg-elev); color: var(--text); }
.icon-btn i { font-size: 16px; }
.icon-btn__dot {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--red);
  border: 1.5px solid white;
}

/* ============ KPI ============ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 18px;
}
.kpi {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  border-left: 3px solid var(--primary);
}
.kpi--amber { border-left-color: var(--amber); }
.kpi--green { border-left-color: var(--green); }
.kpi--violet { border-left-color: var(--violet); }
.kpi--red { border-left-color: var(--red); }
.kpi__label {
  font-size: 11px;
  color: var(--text-mute);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.kpi__value {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-top: 6px;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.kpi__unit { font-size: 13px; color: var(--text-faint); font-weight: 400; }
.kpi__meta {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-mute);
}

/* ============ PANEL ============ */
.panel {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.panel__head {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel__title { font-size: 13px; font-weight: 600; }
.panel__sub { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
.panel__action { font-size: 12px; color: var(--primary); }

/* ============ TABLE ============ */
.table-wrap { overflow-x: auto; }
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.data th {
  text-align: left;
  font-weight: 600;
  font-size: 10.5px;
  color: var(--text-mute);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 10px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
}
.data td {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border-soft);
  color: var(--text);
  white-space: nowrap;
}
.data tbody tr:hover { background: var(--bg); }
.data tbody tr:last-child td { border-bottom: none; }
.data .num { text-align: right; font-variant-numeric: tabular-nums; }
.data .mono { font-family: var(--font-mono); }
.data .id { color: var(--primary); font-family: var(--font-mono); }

/* ============ PILL ============ */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  border-radius: 999px;
}
.pill::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.pill.no-dot::before { display: none; }
.pill--blue { background: var(--primary-bg); color: var(--primary-text); }
.pill--green { background: var(--green-bg); color: var(--green-text); }
.pill--amber { background: var(--amber-bg); color: var(--amber-text); }
.pill--red { background: var(--red-bg); color: var(--red-text); }
.pill--gray { background: var(--bg-elev); color: var(--text-mute); }
.pill--violet { background: var(--violet-bg); color: var(--violet-text); }

/* ============ CHIP ============ */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  font-size: 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: white;
  cursor: pointer;
}
.chip:hover { background: var(--bg-elev); }
.chip.active {
  background: var(--primary-bg);
  border-color: var(--primary);
  color: var(--primary-text);
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; }

/* ============ TABS ============ */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.tab {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text-mute);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  font-weight: 500;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab__count {
  margin-left: 6px;
  padding: 1px 6px;
  background: var(--bg-elev);
  color: var(--text-mute);
  border-radius: 4px;
  font-size: 11px;
}
.tab.active .tab__count { background: var(--primary-bg); color: var(--primary-text); }

/* ============ STEP / SERVICE BUILDER ============ */
.builder {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 16px;
  align-items: start;
}
.step-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 12px;
  align-items: center;
}
.step-card__handle {
  color: var(--text-soft);
  cursor: grab;
  font-size: 18px;
}
.step-card__order {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--primary-bg);
  color: var(--primary-text);
  display: grid;
  place-items: center;
  font-weight: 600;
  font-size: 11px;
}
.step-card__body { min-width: 0; }
.step-card__name { font-size: 13px; font-weight: 500; }
.step-card__meta {
  font-size: 11px;
  color: var(--text-mute);
  margin-top: 2px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.step-card__price {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  text-align: right;
}
.step-card__price small {
  display: block;
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 400;
  margin-top: 2px;
}

/* ============ PRICE MATRIX ============ */
.price-matrix {
  display: grid;
  grid-template-columns: 1fr repeat(5, 70px);
  gap: 0;
  font-size: 12px;
  font-family: var(--font-mono);
}
.price-matrix__head {
  padding: 8px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
  text-align: center;
  font-family: var(--font-sans);
}
.price-matrix__head:first-child { text-align: left; padding-left: 14px; }
.price-matrix__row {
  display: contents;
}
.price-matrix__label {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-soft);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 12.5px;
}
.price-matrix__cell {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid var(--border-soft);
  border-left: 1px solid var(--border-soft);
}
.price-matrix__cell--null { color: var(--text-soft); }
.price-matrix__cell--cert {
  color: var(--green-text);
  background: var(--green-bg);
  font-weight: 600;
}

/* ============ FORM ============ */
.form-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border-soft);
  align-items: start;
}
.form-row:last-child { border-bottom: none; }
.form-label {
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
  padding-top: 8px;
}
.form-label__hint {
  display: block;
  font-size: 11px;
  color: var(--text-mute);
  font-weight: 400;
  margin-top: 3px;
}
.input, .select, .textarea {
  width: 100%;
  background: white;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 12px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.input:focus, .select:focus, .textarea:focus { border-color: var(--primary); }
.textarea { resize: vertical; min-height: 80px; font-family: inherit; }

/* ============ SKILL MATRIX (per-agent or per-skill) ============ */
.skill-grid {
  display: grid;
  grid-template-columns: 1fr repeat(5, 56px);
  gap: 0;
  font-size: 12px;
}
.skill-grid__head {
  padding: 8px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 600;
  text-align: center;
}
.skill-grid__head:first-child { text-align: left; padding-left: 14px; }
.skill-grid__name {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-soft);
}
.skill-grid__cell {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid var(--border-soft);
  border-left: 1px solid var(--border-soft);
  font-family: var(--font-mono);
  color: var(--text-soft);
  font-size: 11px;
}
.skill-grid__cell--has {
  color: var(--primary);
  background: var(--primary-bg);
  font-weight: 600;
}
.skill-grid__cell--cert {
  color: var(--green-text);
  background: var(--green-bg);
  font-weight: 600;
}

/* ============ STATUS BAR ============ */
.statusbar {
  position: sticky;
  bottom: 0;
  background: white;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 8px 20px;
  gap: 14px;
  font-size: 11px;
  color: var(--text-mute);
}
.statusbar__sep { color: var(--text-soft); }
.statusbar__dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 4px;
  display: inline-block;
  vertical-align: middle;
}
.statusbar__right { margin-left: auto; display: flex; gap: 14px; }

/* ============ MISC ============ */
.mono { font-family: var(--font-mono); }
.text-mute { color: var(--text-mute); }
.text-faint { color: var(--text-faint); }
.text-primary { color: var(--primary); }
.text-amber { color: var(--amber-text); }
.text-green { color: var(--green-text); }
.text-red { color: var(--red-text); }
.divider { height: 1px; background: var(--border-soft); margin: 14px 0; }
.alert {
  display: flex;
  gap: 10px;
  padding: 11px 14px;
  background: var(--amber-bg);
  border: 1px solid #fde68a;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 13px;
}
.alert i { color: var(--amber-text); font-size: 18px; }
.alert--info { background: var(--primary-bg); border-color: var(--primary-border); color: var(--primary-text); }
.alert--info i { color: var(--primary); }

/* ============ v3 ADDITIONS ============ */

/* State flow visualization */
.flow-stages {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.flow-stage {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px;
  text-align: center;
  font-size: 11px;
}
.flow-stage--done { background: var(--green-bg); border-color: #86efac; color: var(--green-text); }
.flow-stage--active { background: var(--primary-bg); border-color: var(--primary); color: var(--primary-text); font-weight: 600; box-shadow: 0 2px 8px rgba(79,70,229,0.15); }
.flow-stage__icon { font-size: 16px; display: block; margin-bottom: 2px; }
.flow-stage__num { font-size: 9px; font-weight: 600; opacity: 0.6; letter-spacing: 0.5px; }
.flow-stage__name { font-weight: 500; font-size: 11px; margin-top: 2px; }

/* Photo gallery */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.photo-tile {
  aspect-ratio: 1;
  background: var(--bg-elev);
  border-radius: 8px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  display: grid;
  place-items: center;
}
.photo-tile:hover { border-color: var(--primary); }
.photo-tile__bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #c7d2fe 0%, #6366f1 100%);
  opacity: 0.6;
}
.photo-tile__bg--after { background: linear-gradient(135deg, #bbf7d0 0%, #16a34a 100%); }

/* QR placeholder */

  place-items: center;
  position: relative;
}
.qr-box::after {
  content: '';

  inset: 30%;
  background: white;
  border: 2px solid #000;
  display: grid;
  place-items: center;
}
.qr-box__brand {
  position: absolute;
  inset: 38%;

  place-items: center;

/* Contract card */

  background: white;
  border: 1px solid var(--border);

  padding: 16px;
}

  gap: 10px;
}

/* Geo / Coverage */
.coverage-map {
  height: 360px;
  background:

    radial-gradient(circle at 65% 55%, rgba(29,158,117,0.15) 0, transparent 30%),
    radial-gradient(circle at 50% 30%, rgba(217,119,6,0.1) 0, transparent 25%),
    linear-gradient(var(--bg-elev) 1px, transparent 1px) 0 0/40px 40px,

  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.coverage-pin {
  position: absolute;
  transform: translate(-50%, -50%);
  background: white;
  padding: 6px 10px;
  border-radius: 18px;
  border: 1.5px solid var(--border);
  font-size: 11px;
  font-weight: 600;

  gap: 5px;
}
.coverage-pin__dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.coverage-pin--high { border-color: var(--green); }
.coverage-pin--high .coverage-pin__dot { background: var(--green); }
.coverage-pin--med { border-color: var(--amber); }
.coverage-pin--med .coverage-pin__dot { background: var(--amber); }
.coverage-pin--low { border-color: var(--red); }
.coverage-pin--low .coverage-pin__dot { background: var(--red); }

/* Dispatch round visualization */
.dispatch-round {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 14px;

}

.dispatch-round__label {
  font-size: 11px;

}
.dispatch-round__timeline {

}

/* Survey result */
.survey-result {

/* Step proof requirement indicator */
.proof-req {

  font-weight: 600;

  border-radius: 4px;
}

function getPageFromHash() {
  const h = window.location.hash.slice(1);
  if (h && PAGES[h]) return h;
  return 'dashboard';
}

function render(pageId) {
  const p = PAGES[pageId];
  if (!p) return;
  document.getElementById('main-content').innerHTML = p.body;
  SMPAdmin.init(p.init);
  document.querySelectorAll('a[href$=".html"]').forEach(a => {
    const target = a.getAttribute('href').replace('.html', '').replace('../', '').replace('pages/', '');
    if (PAGES[target]) {
      a.setAttribute('href', '#' + target);
    }
  });
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', () => {
  render(getPageFromHash());
});

render(getPageFromHash());
